function buildCard(row,idx,f,prefix='c'){
  const {headers,role,type}=f;
  const dateH=fh(headers,'date');
  const uid=`${prefix}-${f.id.replace(/[^a-zA-Z0-9]/g,'_')}-${idx}`;
  const dateStr=fmtDate(row[dateH]||'');
  let chips='';
  const motiH=fh(headers,'moti');
  if(motiH){const v=parseFloat(row[motiH]);if(!isNaN(v))chips+=`<span class="chip ${v>=4?'c-g':v<=2?'c-r':'c-a'}">やる気${v}</span>`;}
  if(!blank(fv(row,headers,'kudos')))chips+=`<span class="chip c-a">🌟</span>`;
  let body='';
  if((role==='shijutsu'||role==='kairo')&&type==='nippo'){
    const saH=fh(headers,'shinkiAch'),kaH=fh(headers,'kizonAch');
    const sa=saH?parseFloat(row[saH])||0:0,ka=kaH?parseFloat(row[kaH])||0:0;
    if(sa>0)chips+=`<span class="chip c-b">新規${sa}枚</span>`;
    if(ka>0)chips+=`<span class="chip c-g">更新${ka}枚</span>`;
    body=buildNippoBody(row,headers);
  }else{body=buildTextBody(row,headers);}
  return`<div class="day-card col" id="${uid}">
    <div class="dc-head" onclick="this.closest('.day-card').classList.toggle('col')">
      <div class="dc-date">📅 ${dateStr}</div><div class="dc-chips">${chips}</div><span class="caret">▾</span>
    </div>
    <div class="dc-body">${body}<div class="ai-card" id="ai-${uid}"><div class="ai-lbl">⚡ AI要点サマリー</div><div class="sk sk1"></div><div class="sk sk2"></div><div class="sk sk3"></div></div></div>
  </div>`;
}

function buildNippoBody(row,headers){
  const nums=[{k:'sns',l:'SNS'},{k:'kuchi',l:'口コミ'},{k:'shorei',l:'症例'},{k:'col',l:'コラム'},{k:'shinkan',l:'紹介新患数'}].filter(n=>{const h=fh(headers,n.k);return h&&row[h]!==''&&row[h]!==null;});
  const soH=fh(headers,'shinkiOpp'),saH=fh(headers,'shinkiAch'),koH=fh(headers,'kizonOpp'),kaH=fh(headers,'kizonAch');
  const so=soH?parseFloat(row[soH])||0:0,sa=saH?parseFloat(row[saH])||0:0;
  const ko=koH?parseFloat(row[koH])||0:0,ka=kaH?parseFloat(row[kaH])||0:0;
  const sp=pct(sa,so),kp=pct(ka,ko);
  const numHTML=nums.length?`<div class="sec-block"><div class="sec-lbl"><span class="sec-dot" style="background:var(--b500)"></span>数値実績</div><div class="metrics">${nums.map(n=>{const h=fh(headers,n.k);return`<div class="met"><div class="met-n">${row[h]}</div><div class="met-l">${n.l}</div></div>`;}).join('')}</div></div>`:'';
  const rateHTML=(soH||koH)?`<div class="sec-block"><div class="sec-lbl"><span class="sec-dot" style="background:var(--b400)"></span>回数券成約率</div>${soH?`<div style="margin-bottom:.45rem"><div class="sec-lbl" style="margin-bottom:.18rem">新規</div><div style="display:flex;align-items:center;gap:.38rem"><div class="met" style="flex:0;min-width:44px"><div class="met-n">${so}</div><div class="met-l">提案</div></div><span style="color:var(--muted)">→</span><div class="met" style="flex:0;min-width:44px"><div class="met-n">${sa}</div><div class="met-l">成約</div></div><div class="met" style="background:${sp!==null&&sp>=50?'var(--green-bg)':'var(--red-bg)'};color:${sp!==null&&sp>=50?'var(--green)':'var(--red)'}"><div class="met-n" style="font-size:.95rem">${sp!==null?sp+'%':'—'}</div><div class="met-l">成約率</div></div></div></div>`:''}${koH?`<div><div class="sec-lbl" style="margin-bottom:.18rem">既存</div><div style="display:flex;align-items:center;gap:.38rem"><div class="met" style="flex:0;min-width:44px"><div class="met-n">${ko}</div><div class="met-l">機会</div></div><span style="color:var(--muted)">→</span><div class="met" style="flex:0;min-width:44px"><div class="met-n">${ka}</div><div class="met-l">成約</div></div><div class="met" style="background:${kp!==null&&kp>=50?'var(--green-bg)':'var(--red-bg)'};color:${kp!==null&&kp>=50?'var(--green)':'var(--red)'}"><div class="met-n" style="font-size:.95rem">${kp!==null?kp+'%':'—'}</div><div class="met-l">更新率</div></div></div></div>`:''}</div>`:'';
  const ynKeys=['売上向上','院の課題','ペルソナ','院全体のKPI','院全体の状況','院長のビジョン','報連相','売上・顧客満足','本日のKPI','後輩・スタッフの行動','ケア品質','リピート','カルテ情報','技術指導','第２象限'];
  const ynItems=ynKeys.map(k=>{const h=headers.find(hh=>hh&&hh.includes(k));return h&&row[h]?{h,v:row[h],l:h.replace(/【|】/g,'').replace(/\n.*/,'').slice(0,22)}:null;}).filter(Boolean);
  // チェックボックス方式（新フォーマット）
  const cbH2=fh(headers,'checkbox');
  const cbComH=fh(headers,'checkboxComment');
  const cbVal=cbH2?String(row[cbH2]||'').trim():'';
  const cbItems=cbVal?cbVal.split(/[,\u3001\n]/).map(s=>s.trim().replace(/^【|】$/g,'').trim()).filter(Boolean):[];
  const cbComment=cbComH?String(row[cbComH]||'').trim():'';
  const cbHTML=cbItems.length?`<div class="sec-block"><div class="sec-lbl"><span class="sec-dot" style="background:var(--teal)"></span>本日の意識項目（${cbItems.length}項目✓）</div><div class="yn-list">${cbItems.map(item=>`<div class="yn-row"><span class="yn-b yn-yes" style="background:#ecfeff;color:var(--teal)">✓</span><span>${esc(item)}</span></div>`).join('')}${cbComment&&!blank(cbComment)?`<div class="txt-block hl" style="margin-top:.38rem"><div class="txt-lbl">コメント</div>${esc(cbComment)}</div>`:''}</div></div>`:'';
  const ynHTML=cbHTML||(ynItems.length?`<div class="sec-block"><div class="sec-lbl"><span class="sec-dot" style="background:var(--green)"></span>行動チェック</div><div class="yn-list">${ynItems.map(n=>{const y=n.v==='はい';return`<div class="yn-row"><span class="yn-b ${y?'yn-yes':'yn-no'}">${y?'YES':'NO'}</span><span>${esc(n.l)}</span></div>`;}).join('')}</div></div>`:'');
  const texts=[{k:'ikusei',l:'育成シェア',cls:'ikusei'},{k:'joui',l:'情意評価',cls:''},{k:'theme',l:'テーマ・フィロソフィー',cls:'theme-c'},{k:'kudos',l:'🌟承認',cls:'kudos'}];
  const tc=texts.map(t=>{const v=fv(row,headers,t.k);return blank(v)?'': `<div class="txt-block ${t.cls}"><div class="txt-lbl">${t.l}</div>${esc(v)}</div>`;}).join('');
  return`<div class="sec-grid">${numHTML}${rateHTML}${ynHTML}${tc?`<div class="sec-block full"><div class="sec-lbl"><span class="sec-dot" style="background:var(--b400)"></span>コメント</div>${tc}</div>`:''}</div>`;
}

function buildTextBody(row,headers){
  const motiH=fh(headers,'moti'),loadH=fh(headers,'load');
  const mv=motiH?parseFloat(row[motiH]):NaN,lv=loadH?parseFloat(row[loadH]):NaN;
  const bikkaH=fh(headers,'bikka'),achH=fh(headers,'achRate');
  const scoreHTML=(!isNaN(mv)||!isNaN(lv))?`<div class="sec-block"><div class="sec-lbl"><span class="sec-dot" style="background:var(--b500)"></span>コンディション</div>${!isNaN(mv)?`<div style="margin-bottom:.45rem"><div class="sec-lbl" style="margin-bottom:.2rem">モチベーション ${mv}/5</div><div class="score-bar-wrap"><div class="score-bar"><div class="score-bar-fill" style="width:${mv/5*100}%;background:${mv>=4?'var(--green)':mv<=2?'var(--red)':'var(--amber)'}"></div></div><span style="font-family:'JetBrains Mono',monospace;font-size:.76rem;font-weight:600">${mv}</span></div></div>`:''}${!isNaN(lv)?`<div><div class="sec-lbl" style="margin-bottom:.2rem">業務負荷 ${lv}/5</div><div class="score-bar-wrap"><div class="score-bar"><div class="score-bar-fill" style="width:${lv/5*100}%;background:${lv>=4?'var(--red)':lv<=2?'var(--green)':'var(--amber)'}"></div></div><span style="font-family:'JetBrains Mono',monospace;font-size:.76rem;font-weight:600">${lv}</span></div></div>`:''}${achH&&!blank(row[achH])?`<div style="margin-top:.38rem"><div class="sec-lbl" style="margin-bottom:.08rem">前週達成率</div><span style="font-weight:700;font-family:'JetBrains Mono',monospace">${row[achH]}${String(row[achH]).includes('%')?'':'%'}</span></div>`:''}${bikkaH&&row[bikkaH]?`<div style="margin-top:.35rem"><span class="yn-b ${row[bikkaH]==='はい'?'yn-yes':'yn-no'}">${row[bikkaH]==='はい'?'YES':'NO'}</span> 院内美化</div>`:''}</div>`:'';
  const blocks=[{k:'eval',l:'先週の評価・課題',cls:''},{k:'goal',l:'今週の目標',cls:'hl'},{k:'prevTodo',l:'先週のやることリスト',cls:''},{k:'done',l:'今週の成果・完了タスク',cls:''},{k:'issue',l:'課題・ブロッカー',cls:''},{k:'todo',l:'今週のやることリスト',cls:''},{k:'ikusei',l:'育成意識シェア',cls:'ikusei'},{k:'joui',l:'情意評価シェア',cls:''},{k:'theme',l:'テーマ・フィロソフィー',cls:'theme-c'},{k:'kudos',l:'🌟承認・賞賛',cls:'kudos'},{k:'impressed',l:'印象に残った人',cls:''},{k:'free',l:'要望・質問',cls:''}];
  const tc=blocks.map(b=>{const v=fv(row,headers,b.k);return blank(v)?'':`<div class="txt-block ${b.cls}"><div class="txt-lbl">${b.l}</div>${esc(v)}</div>`;}).join('');
  return`<div class="sec-grid">${scoreHTML}${tc?`<div class="sec-block" style="grid-column:1/-1"><div class="sec-lbl"><span class="sec-dot" style="background:var(--b400)"></span>記述内容</div>${tc}</div>`:''}</div>`;
}

async function genAllCards(){
  const f=FILES.find(f=>f.id===activeId);
  if(!f)return;
  const btn=document.getElementById('btnAiAll');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  document.querySelectorAll('.day-card.col').forEach(c=>c.classList.remove('col'));
  const dateH=fh(f.headers,'date');
  let rows=filterDate==='all'?[...f.rows]:f.rows.filter(r=>fmtDate(r[dateH])===filterDate);
  rows.sort((a,b)=>{const da=fmtDate(a[dateH]),db=fmtDate(b[dateH]);return sortDir==='asc'?da.localeCompare(db):db.localeCompare(da);});

}

async function genOneCard(row,idx,f,prefix='c'){
  const uid=`${prefix}-${f.id.replace(/[^a-zA-Z0-9]/g,'_')}-${idx}`;
  const block=document.getElementById(`ai-${uid}`);
  if(!block)return;
  const entries=Object.entries(row).filter(([k,v])=>v&&v!==''&&v!=='0'&&!blank(v)).map(([k,v])=>`${k}：${v}`).join('\n');
  const rn={uketuke:'受付',kairo:'カイロプラクター',shijutsu:'施術者',other:'スタッフ'}[f.role]||'スタッフ';
  const prompt=`${rn}の${f.type==='nippo'?'日報':'週報'}データ。\n\n${entries}\n\n上司向け3点（各35字以内）。${f.role==='uketuke'?'業務・育成・コンディション観点。':'数字成果・育成・翌日アクション観点。'}\nJSON形式のみ: {"points":[{"icon":"📈","text":""},{"icon":"⚠️","text":""},{"icon":"🎯","text":""}]}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=(data.content||[]).map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const pts=JSON.parse(text).points||[];
    block.innerHTML=`<div class="ai-lbl">⚡ AI要点サマリー</div><ul class="ai-pts">${pts.map(p=>`<li><span>${p.icon}</span><span>${esc(p.text)}</span></li>`).join('')}</ul>`;
  }catch{block.innerHTML=`<div class="ai-lbl">⚡ AI要点サマリー</div><p style="font-size:.75rem;opacity:.4">生成できませんでした</p>`;}
}

// ════════════════════════════════════════
//  AI — 成長傾向分析
// ════════════════════════════════════════
async function genGrowthAnalysis(){
  const btn=document.getElementById('btnAiGrowth');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';

  // Gather current person's files
  let targetFiles=[];
  if(activeId&&activeId.startsWith('__merged__')){
    const idx=parseInt(activeId.replace('__merged__',''));
    const person=mergedIndex[idx];
    targetFiles=FILES.filter(f=>f.person===person);
  }else{
    const f=FILES.find(f=>f.id===activeId);
    if(f)targetFiles=[f];
  }
  if(!targetFiles.length){btn.disabled=false;btn.innerHTML='📈 成長傾向分析';return;}

  const growthArea=document.getElementById('growthArea');
  if(growthArea)growthArea.innerHTML=`<div class="ai-growth"><div class="ag-header">📈 AI 成長傾向分析 <span class="spin"></span></div><div class="sk sk1"></div><div class="sk sk2"></div><div class="sk sk3"></div></div>`;

  // Build time-series data (圧縮: 重要項目のみ・最大20件)
  const allData=targetFiles.map(f=>{
    const dateH=fh(f.headers,'date');
    const motiH=fh(f.headers,'moti'),loadH=fh(f.headers,'load');
    const soH=fh(f.headers,'shinkiOpp'),saH=fh(f.headers,'shinkiAch');
    const koH=fh(f.headers,'kizonOpp'),kaH=fh(f.headers,'kizonAch');
    const cbH=fh(f.headers,'checkbox'),themeH=fh(f.headers,'theme');
    const ikuseiH=fh(f.headers,'ikusei');
    const sorted=[...f.rows].sort((a,b)=>fmtDate(a[dateH]||'').localeCompare(fmtDate(b[dateH]||''))).slice(-20);
    return sorted.map(r=>{
      const d=fmtDate(r[dateH]||'');
      const parts=[];
      if(motiH&&r[motiH])parts.push(`モチベ:${r[motiH]}`);
      if(loadH&&r[loadH])parts.push(`負荷:${r[loadH]}`);
      if(soH&&saH)parts.push(`新規成約:${r[saH]||0}/${r[soH]||0}`);
      if(koH&&kaH)parts.push(`既存更新:${r[kaH]||0}/${r[koH]||0}`);
      if(cbH&&r[cbH]){const items=String(r[cbH]).split(/[,\u3001\n]/).filter(Boolean);parts.push(`チェック${items.length}項目`);}
      if(themeH&&r[themeH]&&!blank(r[themeH]))parts.push(`テーマ:${String(r[themeH]).slice(0,40)}`);
      if(ikuseiH&&r[ikuseiH]&&!blank(r[ikuseiH]))parts.push(`育成:${String(r[ikuseiH]).slice(0,40)}`);
      return`[${f.type==='nippo'?'日報':'週報'} ${d}] ${parts.join(' | ')}`;
    }).join('\n');
  }).join('\n\n');

  const person=targetFiles[0].person;
  const role={uketuke:'受付',kairo:'カイロプラクター',shijutsu:'施術者',other:'スタッフ'}[targetFiles[0].role]||'スタッフ';
  const prompt=`${person}（${role}）の時系列データです。\n\n${allData}\n\n以下の観点でこの人物の成長傾向を分析してください。上司が面談や育成に使うためのレポートです。\nJSON形式のみで返答: {"sections":[{"icon":"📈","label":"数値・行動の変化","text":""},{"icon":"💡","label":"強みと成長ポイント","text":""},{"icon":"⚠️","label":"停滞・課題の傾向","text":""},{"icon":"🎯","label":"次のステージへの提言","text":""},{"icon":"💬","label":"上司へのメモ","text":""}]}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=(data.content||[]).map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const secs=JSON.parse(text).sections||[];
    if(growthArea)growthArea.innerHTML=`<div class="ai-growth">
      <div class="ag-header">📈 ${esc(person)} の成長傾向分析</div>
      <div class="ag-sections">
        ${secs.map(s=>`<div class="ag-section"><div class="ag-sec-label">${s.icon} ${esc(s.label)}</div><div class="ag-text">${esc(s.text)}</div></div>`).join('')}
      </div>
    </div>`;
  }catch(e){
    if(growthArea)growthArea.innerHTML=`<div class="ai-growth"><div class="ag-header">📈 成長傾向分析</div><p style="color:rgba(255,255,255,.4);font-size:.82rem">生成できませんでした</p></div>`;
  }

}

// ════════════════════════════════════════
//  CHART (推移グラフ)
// ════════════════════════════════════════
let chartInstances = {};
function buildChartSection(f) {
  const id = 'chart_' + f.id.replace(/[^a-zA-Z0-9]/g,'_');
  return `<div class="chart-wrap">
    <div class="chart-head">
      <span>📈 推移グラフ</span>
      <div class="chart-tabs" id="ctabs_${id}">
        <button class="chart-tab on" data-metric="moti">モチベ</button>
        <button class="chart-tab" data-metric="load">業務負荷</button>
        <button class="chart-tab" data-metric="shinki">新規成約率</button>
        <button class="chart-tab" data-metric="kizon">既存更新率</button>
        <button class="chart-tab" data-metric="checkbox">チェック数</button>
      </div>
    </div>
    <div class="chart-body"><canvas id="${id}" height="90"></canvas></div>
  </div>`;
}

function initChart(f) {
  const id = 'chart_' + f.id.replace(/[^a-zA-Z0-9]/g,'_');
  const el = document.getElementById(id);
  if(!el) return;
  if(chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }

  const dateH = fh(f.headers,'date');
  const sorted = [...f.rows].filter(r=>fmtDate(r[dateH]||'')).sort((a,b)=>fmtDate(a[dateH]).localeCompare(fmtDate(b[dateH])));
  const labels = sorted.map(r=>fmtDate(r[dateH]));

  const ctabs = document.getElementById('ctabs_'+id);
  if(!ctabs) return;

  function getDataset(metric) {
    switch(metric){
      case 'moti': {
        const h=fh(f.headers,'moti');
        return {data:sorted.map(r=>h?parseFloat(r[h])||null:null),label:'モチベーション',color:'#2563b0',max:5};
      }
      case 'load': {
        const h=fh(f.headers,'load');
        return {data:sorted.map(r=>h?parseFloat(r[h])||null:null),label:'業務負荷',color:'#b07010',max:5};
      }
      case 'shinki': {
        const oH=fh(f.headers,'shinkiOpp'),aH=fh(f.headers,'shinkiAch');
        return {data:sorted.map(r=>{const o=oH?parseFloat(r[oH])||0:0;const a=aH?parseFloat(r[aH])||0:0;return o>0?Math.round(a/o*100):null;}),label:'新規成約率%',color:'#1a7a4a',max:100};
      }
      case 'kizon': {
        const oH=fh(f.headers,'kizonOpp'),aH=fh(f.headers,'kizonAch');
        return {data:sorted.map(r=>{const o=oH?parseFloat(r[oH])||0:0;const a=aH?parseFloat(r[aH])||0:0;return o>0?Math.round(a/o*100):null;}),label:'既存更新率%',color:'#6d28d9',max:100};
      }
      case 'checkbox': {
        const cbH=fh(f.headers,'checkbox');
        return {data:sorted.map(r=>{const v=cbH?String(r[cbH]||'').trim():'';return v?v.split(/[,、\n]/).filter(Boolean).length:null;}),label:'チェック数',color:'#0e7490',max:null};
      }
    }
  }

  let currentMetric = 'moti';
  function drawChart(metric){
    if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}
    const ds = getDataset(metric);
    if(!ds) return;
    chartInstances[id] = new Chart(el, {
      type:'line',
      data:{
        labels,
        datasets:[{
          label:ds.label,data:ds.data,
          borderColor:ds.color,backgroundColor:ds.color+'22',
          borderWidth:2,pointRadius:4,pointHoverRadius:6,
          tension:0.3,fill:true,spanGaps:true
        }]
      },
      options:{
        responsive:true,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y}`}}},
        scales:{
          y:{min:0,max:ds.max||undefined,grid:{color:'rgba(0,0,0,.06)'},ticks:{font:{size:10}}},
          x:{grid:{display:false},ticks:{font:{size:10},maxRotation:45}}
        }
      }
    });
  }

  drawChart('moti');
  ctabs.querySelectorAll('.chart-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      ctabs.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('on'));
      btn.classList.add('on');
      drawChart(btn.dataset.metric);
    });
  });
}

function initChartsForCurrent(){

// ════════════════════════════════════════
//  MONTH COMPARE (複数月比較)
// ════════════════════════════════════════
function buildMonthCompare(f) {
  const dateH = fh(f.headers,'date');
  if(!dateH) return '';

  // 月ごとにグループ化
  const monthMap = {};
  f.rows.forEach(r=>{
    const d = fmtDate(r[dateH]||'');
    if(!d) return;
    const ym = d.slice(0,7); // "2026/03"
    if(!monthMap[ym]) monthMap[ym]=[];
    monthMap[ym].push(r);
  });
  const months = Object.keys(monthMap).sort();
  if(months.length < 2) return '';

  const motiH=fh(f.headers,'moti'), loadH=fh(f.headers,'load');
  const soH=fh(f.headers,'shinkiOpp'), saH=fh(f.headers,'shinkiAch');
  const koH=fh(f.headers,'kizonOpp'), kaH=fh(f.headers,'kizonAch');
  const cbH=fh(f.headers,'checkbox');

  const metrics = [];
  if(motiH) metrics.push({label:'モチベ平均',fn:rows=>{const vs=rows.map(r=>parseFloat(r[motiH])).filter(v=>!isNaN(v));return vs.length?(vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(1):'-';}});
  if(loadH) metrics.push({label:'業務負荷平均',fn:rows=>{const vs=rows.map(r=>parseFloat(r[loadH])).filter(v=>!isNaN(v));return vs.length?(vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(1):'-';}});
  if(soH&&saH) metrics.push({label:'新規成約率',fn:rows=>{const o=rows.reduce((a,r)=>a+(parseFloat(r[soH])||0),0);const a=rows.reduce((ac,r)=>ac+(parseFloat(r[saH])||0),0);return o>0?Math.round(a/o*100)+'%':'-';}});
  if(koH&&kaH) metrics.push({label:'既存更新率',fn:rows=>{const o=rows.reduce((a,r)=>a+(parseFloat(r[koH])||0),0);const a=rows.reduce((ac,r)=>ac+(parseFloat(r[kaH])||0),0);return o>0?Math.round(a/o*100)+'%':'-';}});
  if(cbH) metrics.push({label:'平均チェック数',fn:rows=>{const cs=rows.map(r=>{const v=String(r[cbH]||'').trim();return v?v.split(/[,、\n]/).filter(Boolean).length:0;});return cs.length?(cs.reduce((a,b)=>a+b,0)/cs.length).toFixed(1):'-';}});
  metrics.push({label:'提出件数',fn:rows=>rows.length});

  if(!metrics.length) return '';

  const thHTML = months.map(m=>`<th>${m.replace('/','-')}</th>`).join('');

  // 前月比アロー
  const arrow = (cur,prev)=>{
    const c=parseFloat(cur),p=parseFloat(prev);
    if(isNaN(c)||isNaN(p)||cur==='-'||prev==='-') return '';
    if(c>p) return '<span class="mc-up"> ↑</span>';
    if(c<p) return '<span class="mc-down"> ↓</span>';
    return '<span class="mc-same"> →</span>';
  };

  const rowsHTML = metrics.map(m=>{
    const vals = months.map(ym=>m.fn(monthMap[ym]));
    const cells = vals.map((v,i)=>`<td>${v}${i>0?arrow(v,vals[i-1]):''}</td>`).join('');
    return `<tr><td>${m.label}</td>${cells}</tr>`;
  }).join('');

  return `<div class="mc-wrap">
    <div class="mc-head">📅 月別比較（↑↓ 前月比）</div>
    <div class="mc-body">
      <table class="mc-table">
        <thead><tr><th>指標</th>${thHTML}</tr></thead>
        <tbody>${rowsHTML}</tbody>
      </table>
    </div>
  </div>`;
}

function buildMemoPanel(person) {
  const memos = MEMOS[person]||[];
  const items = memos.map((m,i)=>`
    <div class="memo-item">
      <div class="memo-item-date">${m.date}</div>
      <button class="memo-delete" data-person="${esc(person)}" data-idx="${i}" onclick="deleteMemo(this.dataset.person,parseInt(this.dataset.idx))">✕</button>
      ${esc(m.text)}
    </div>`).join('');
  return `<div class="memo-panel">
    <div class="memo-head">📝 院長メモ（${person}）</div>
    <div class="memo-body">
      ${items||'<p style="color:var(--muted);font-size:.82rem">メモなし</p>'}
      <div class="memo-input-row">
        <textarea class="memo-input" id="memoInput_${esc(person)}" rows="2" placeholder="メモを入力..."></textarea>
        <button class="btn btn-primary btn-sm" data-person="${esc(person)}" onclick="addMemo(this.dataset.person)">追加</button>
      </div>
    </div>
  </div>`;
}

function addMemo(person) {
  const el = document.getElementById('memoInput_'+person);
  if(!el||!el.value.trim()) return;
  if(!MEMOS[person]) MEMOS[person]=[];
  MEMOS[person].unshift({date:new Date().toLocaleDateString('ja-JP'),text:el.value.trim()});
  saveMemos();
  render();
}
function deleteMemo(person,idx){
  if(!MEMOS[person]) return;
  MEMOS[person].splice(idx,1);
  saveMemos();
  render();
}

// ════════════════════════════════════════
//  AI INTERVIEW SHEET（面談準備）
// ════════════════════════════════════════
async function genInterviewSheet(){
  const f=FILES.find(f=>f.id===activeId);if(!f)return;
  const btn=document.getElementById('btnInterview');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';

  const dateH=fh(f.headers,'date');
  const recent=[...f.rows].filter(r=>fmtDate(r[dateH]||'')).sort((a,b)=>fmtDate(b[dateH]).localeCompare(fmtDate(a[dateH]))).slice(0,5);
  const summary=recent.map(r=>{
    const d=fmtDate(r[dateH]);
    const motiH2=fh(f.headers,'moti'),cbH2=fh(f.headers,'checkbox');
    const themeH2=fh(f.headers,'theme'),ikuseiH2=fh(f.headers,'ikusei');
    const soH2=fh(f.headers,'shinkiOpp'),saH2=fh(f.headers,'shinkiAch');
    const parts=[];
    if(motiH2&&r[motiH2])parts.push(`モチベ:${r[motiH2]}`);
    if(soH2&&saH2)parts.push(`新規成約:${r[saH2]||0}/${r[soH2]||0}`);
    if(cbH2&&r[cbH2]){const its=String(r[cbH2]).split(/[,\u3001\n]/).filter(Boolean);parts.push(`意識項目:${its.map(s=>s.replace(/【|】/g,'').trim().slice(0,15)).join('/')}`);}
    if(themeH2&&r[themeH2]&&!blank(r[themeH2]))parts.push(`テーマ:${String(r[themeH2]).slice(0,50)}`);
    if(ikuseiH2&&r[ikuseiH2]&&!blank(r[ikuseiH2]))parts.push(`育成:${String(r[ikuseiH2]).slice(0,50)}`);
    return`[${d}] ${parts.join(' | ')}`;
  }).join('\n');
  const memos=(MEMOS[f.person]||[]).map(m=>`${m.date}: ${m.text}`).join('\n');

  const prompt=`${f.person}（${roleLabel(f.role)}）の直近データ:\n${summary}\n${memos?'院長メモ:\n'+memos:''}\n\n上司が次の1on1面談で使うシートをJSON形式のみで作成:\n{"praise":"褒めるべき具体的なポイント（2文）","issue":"課題・懸念点（2文）","questions":["質問1","質問2","質問3"],"action":"面談後の具体的アクション（1文）"}`;

  openAiModal('🗣 面談準備シート — ' + f.person, `<div class="interview-sheet"><div class="is-header">準備中... <span class="spin"></span></div></div>`);

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=(data.content||[]).map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const sheet=JSON.parse(text);
    openAiModal('🗣 面談準備シート — ' + f.person, `<div class="interview-sheet">
      <div class="is-header">🗣 面談準備シート <span style="font-weight:400;font-size:.75rem;opacity:.7">${esc(f.person)} · ${new Date().toLocaleDateString('ja-JP')}</span></div>
      <div class="is-section"><div class="is-sec-label">💪 褒めるポイント</div><div class="is-text">${esc(sheet.praise)}</div></div>
      <div class="is-section"><div class="is-sec-label">⚠️ 課題・懸念点</div><div class="is-text">${esc(sheet.issue)}</div></div>
      <div class="is-section"><div class="is-sec-label">💬 推奨質問</div><ul class="is-qs">${(sheet.questions||[]).map(q=>`<li>${esc(q)}</li>`).join('')}</ul></div>
      <div class="is-section"><div class="is-sec-label">🎯 面談後アクション</div><div class="is-text">${esc(sheet.action)}</div></div>
    </div>`);
  }catch(e){openAiModal('🗣 面談準備シート', `<div class="interview-sheet"><p style="color:rgba(255,255,255,.4)">生成できませんでした: ${esc(String(e))}</p></div>`);}
  btn.disabled=false;btn.innerHTML='🗣 面談準備';
}

// ════════════════════════════════════════
//  MONTHLY REPORT（月次レポートプレビュー）
// ════════════════════════════════════════
function showReport(){
  const f=FILES.find(f=>f.id===activeId);if(!f)return;
  const dateH=fh(f.headers,'date');

  // 月ごとにグループ化
  const monthMap={};
  f.rows.forEach(r=>{const d=fmtDate(r[dateH]||'');if(!d)return;const ym=d.slice(0,7);if(!monthMap[ym])monthMap[ym]=[];monthMap[ym].push(r);});
  const months=Object.keys(monthMap).sort().reverse();
  const latestMonth=months[0]||'';
  const rows=monthMap[latestMonth]||f.rows;

  const soH=fh(f.headers,'shinkiOpp'),saH=fh(f.headers,'shinkiAch');
  const koH=fh(f.headers,'kizonOpp'),kaH=fh(f.headers,'kizonAch');
  const motiH=fh(f.headers,'moti'),cbH=fh(f.headers,'checkbox');
  const sum=h=>h?rows.reduce((a,r)=>a+(parseFloat(r[h])||0),0):0;
  const so=sum(soH),sa=sum(saH),ko=sum(koH),ka=sum(kaH);
  const sp=pct(sa,so),kp=pct(ka,ko);
  const motis=rows.map(r=>motiH?parseFloat(r[motiH]):NaN).filter(v=>!isNaN(v));
  const avgMoti=motis.length?(motis.reduce((a,b)=>a+b,0)/motis.length).toFixed(1):'-';
  const checkAvg=(()=>{if(!cbH)return'-';const cs=rows.map(r=>{const v=String(r[cbH]||'').trim();return v?v.split(/[,、\n]/).filter(Boolean).length:0;});return cs.length?(cs.reduce((a,b)=>a+b,0)/cs.length).toFixed(1):'-';})();

  // テーマ・育成テキスト収集
  const themeH=fh(f.headers,'theme'),ikuseiH=fh(f.headers,'ikusei'),kudosH=fh(f.headers,'kudos');
  const themes=rows.map(r=>themeH?String(r[themeH]||''):'').filter(v=>!blank(v)).slice(0,3);
  const ikuseis=rows.map(r=>ikuseiH?String(r[ikuseiH]||''):'').filter(v=>!blank(v)).slice(0,2);

  const memos=(MEMOS[f.person]||[]).slice(0,3).map(m=>`<li>${m.date}：${m.text}</li>`).join('');

  const html=`<div class="report-preview" id="reportPreview">
    <div style="text-align:center;margin-bottom:1.2rem;border-bottom:3px solid #1a3a6b;padding-bottom:.75rem">
      <div style="font-size:.72rem;color:#666;letter-spacing:.1em">月次評価レポート</div>
      <h2 style="border:none;padding:0;margin:.2rem 0 .1rem;font-size:1.4rem">${esc(f.person)}</h2>
      <div style="font-size:.8rem;color:#555">${roleLabel(f.role)} ／ 対象月：${latestMonth} ／ 提出${rows.length}件</div>
    </div>
    <h3>📊 数値実績</h3>
    <div class="rp-row">
      <div class="rp-stat"><div class="rp-stat-n">${rows.length}</div><div class="rp-stat-l">提出件数</div></div>
      ${soH?`<div class="rp-stat"><div class="rp-stat-n">${sa}/${so}</div><div class="rp-stat-l">新規成約/提案${sp!==null?' ('+sp+'%)':''}</div></div>`:''}
      ${koH?`<div class="rp-stat"><div class="rp-stat-n">${ka}/${ko}</div><div class="rp-stat-l">既存更新/機会${kp!==null?' ('+kp+'%)':''}</div></div>`:''}
      ${motiH?`<div class="rp-stat"><div class="rp-stat-n">${avgMoti}</div><div class="rp-stat-l">モチベ平均/5</div></div>`:''}
      ${cbH?`<div class="rp-stat"><div class="rp-stat-n">${checkAvg}</div><div class="rp-stat-l">平均チェック数</div></div>`:''}
    </div>
    ${themes.length?`<h3>🎯 テーマ・フィロソフィーシェア</h3>${themes.map(t=>`<p style="margin:.3rem 0;padding:.4rem .6rem;background:#f0f7ff;border-left:3px solid #2563b0;font-size:.82rem">${t}</p>`).join('')}`:''}
    ${ikuseis.length?`<h3>💪 育成意識シェア</h3>${ikuseis.map(t=>`<p style="margin:.3rem 0;padding:.4rem .6rem;background:#e8f7f0;border-left:3px solid #1a7a4a;font-size:.82rem">${t}</p>`).join('')}`:''}
    ${memos?`<h3>📝 院長メモ</h3><ul style="font-size:.82rem;padding-left:1.2rem;line-height:1.8">${memos}</ul>`:''}
    <div style="margin-top:1.2rem;border-top:1px solid #ddd;padding-top:.6rem;font-size:.72rem;color:#999;text-align:right">出力日：${new Date().toLocaleDateString('ja-JP')}</div>
  </div>`;

  document.getElementById('mainInner').innerHTML=`
    <div class="meta-bar"><div><div class="meta-name">月次レポート</div><div class="meta-sub">${esc(f.person)} · ${latestMonth}</div></div>
      <div class="controls">
        <button class="btn btn-primary btn-sm" onclick="printReport()">🖨 印刷</button>
        <button class="btn btn-outline btn-sm" onclick="render()">← 戻る</button>
      </div>
    </div>${html}`;
}

function doSave(){
  const f=FILES.find(f=>f.id===activeId);
  if(!f){alert('保存するファイルを選択してください');return;}
  const dateH=fh(f.headers,'date');
  let txt=`■ スタッフ評価レポート\nファイル：${f.name}\n対象者：${f.person}\n種別：${roleLabel(f.role)} / ${f.type==='nippo'?'日報':'週報'}\n出力：${new Date().toLocaleString('ja-JP')}\n件数：${f.rows.length}件\n${'─'.repeat(48)}\n\n`;
  f.rows.forEach(row=>{
    txt+=`【${fmtDate(row[dateH]||'')}】\n`;
    Object.entries(row).forEach(([k,v])=>{if(v&&v!==''&&v!=='0'&&!blank(v))txt+=`  ${k}：${v}\n`;});
    txt+='\n';
  });
  try{
    const blob=new Blob(['\uFEFF'+txt],{type:'text/plain;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=`評価レポート_${f.person}_${new Date().toISOString().slice(0,10)}.txt`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){alert('保存に失敗しました: '+e.message);}
}
